<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard - Nine Star Auto</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  </head>
  <body class="admin-body">
    <div class="admin-layout">
      <!-- Sidebar -->
      <aside class="admin-sidebar">
        <div class="logo" style="padding: 2rem;">
          <i class="fas fa-star"></i> NINE STAR <span>ADMIN</span>
        </div>
        <nav class="admin-nav">
          <button class="nav-item active" data-tab="deals">
            <i class="fas fa-tags"></i> Hot Deals
          </button>
          <button class="nav-item" data-tab="gallery">
            <i class="fas fa-images"></i> Gallery
          </button>
          <div style="margin-top: auto; padding: 2rem;">
            <button class="btn btn-primary" id="export-json" style="width: 100%;">
              <i class="fas fa-download"></i> Save Changes
            </button>
          </div>
        </nav>
      </aside>

      <!-- Main Content -->
      <main class="admin-main">
        <div class="stats-overview">
          <div class="stat-mini-card">
            <span>Total Cars</span>
            <h2 id="stat-total-cars">0</h2>
          </div>
          <div class="stat-mini-card">
            <span>Active Deals</span>
            <h2 id="stat-active-deals">0</h2>
          </div>
          <div class="stat-mini-card">
            <span>Gallery Items</span>
            <h2 id="stat-gallery-items">0</h2>
          </div>
          <div class="stat-mini-card">
            <span>System Status</span>
            <h2 style="color: #10b981; font-size: 1rem;"><i class="fas fa-circle"></i> Online</h2>
          </div>
        </div>

        <header class="admin-header">
          <h1 id="tab-title">Hot Deals Management</h1>
          <button class="btn btn-primary" id="add-new-btn">
            <i class="fas fa-plus"></i> Create New Item
          </button>
        </header>

        <div class="admin-content">
          <div id="items-list" class="admin-grid">
            <!-- Items will be injected here -->
          </div>
        </div>
      </main>
    </div>

    <!-- Mobile Bottom Navigation -->
    <div class="admin-mobile-nav">
      <button class="mobile-nav-item active" data-tab="deals">
        <i class="fas fa-tags"></i>
        <span>Deals</span>
      </button>
      <button class="mobile-nav-item" data-tab="gallery">
        <i class="fas fa-images"></i>
        <span>Gallery</span>
      </button>
      <button id="mobile-export-btn">
        <i class="fas fa-cloud-arrow-up"></i>
        <span>Save</span>
      </button>
    </div>

    <!-- Edit Modal -->
    <div class="modal-overlay" id="edit-modal">
      <div class="modal" style="max-width: 800px;">
        <button class="modal-close">&times;</button>
        <div class="modal-body">
          <h2 id="modal-title">Edit Item</h2>
          <form id="edit-form" class="admin-form">
            <div id="form-fields" class="form-grid">
              <!-- Fields injected based on type -->
            </div>
            <div style="margin-top: 2rem; display: flex; gap: 1rem;">
              <button type="submit" class="btn btn-primary">Save to List</button>
              <button type="button" class="btn btn-outline modal-close">Cancel</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- Export Modal -->
    <div class="modal-overlay" id="export-modal">
      <div class="modal" style="max-width: 700px;">
        <button class="modal-close">&times;</button>
        <div class="modal-body">
          <h2>Update Your Website</h2>
          <p>Copy the code below and paste it into your <strong>data.json</strong> file to save your changes permanently.</p>
          <textarea id="json-output" readonly style="width: 100%; height: 300px; background: #000; color: #0f0; font-family: monospace; padding: 1rem; border-radius: 8px; margin: 1.5rem 0;"></textarea>
          <button class="btn btn-primary" id="copy-json">
            <i class="fas fa-copy"></i> Copy Code
          </button>
        </div>
      </div>
    </div>

    <script type="module" src="/src/admin.js"></script>
  </body>
</html>
