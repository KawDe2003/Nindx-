<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Nine Star Auto Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>
<body class="admin-body">
    <div class="login-container">
        <div class="login-box reveal">
            <div class="logo" style="justify-content: center; margin-bottom: 2rem;">
                <i class="fas fa-star"></i> NINE STAR <span>ADMIN</span>
            </div>
            <h2>Welcome Back</h2>
            <p style="color: var(--text-secondary); margin-bottom: 2rem;">Please enter your credentials to access the dashboard.</p>
            
            <form id="login-form" class="admin-form">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" placeholder="Enter username" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Enter password" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem; margin-top: 1rem;">
                    Login to Dashboard
                </button>
            </form>
            <div id="login-error" style="color: #ef4444; margin-top: 1rem; font-size: 0.9rem; text-align: center; display: none;">
                Invalid username or password.
            </div>
        </div>
    </div>

    <script type="module" src="/src/login.js"></script>
</body>
</html>
